er from your institution or employer\",\"bullet4\":\"Professional portfolio or equivalent supporting materials\",\"gotIt\":\"Got it\",\"intro\":\"We have noticed some irregular activity on your account. In order to ensure you are eligible for all projects, please provide any of the following documentation to help us confirm your identity and credentials.\",\"reverifyNote\":\"You may also be asked to re-verify your identity — if so, you'll see an additional step. Once your review is complete, our team will reach back out via email.\",\"submitTo\":\"Please submit your documentation to {email}.\",\"title\":\"Your Handshake AI account is under review\"}},\"NoProjectsOnboardingVideo\":{\"description\":\"Your application is complete, and you're ready for project matching. We'll email you as soon as a project is available.\",\"title\":\"You're all set!\"},\"OnboardingFaq\":{\"expertise\":[{\"answer\":\"Your resume helps us understand your background, skills, and areas of expertise so we can match you to projects that are the best fit. The more complete and accurate it is, the better your matches will be.\",\"question\":\"How is my resume used to match me to projects?\"},{\"answer\":\"Currently we only accept PDF as a format for your resume.\",\"question\":\"What file format should my resume be in?\"},{\"answer\":\"Currently no, so please make sure all the information shown is correct. Should anything change after submitting, please reach out to our support team.\",\"question\":\"Can I change this information later?\"},{\"answer\":\"At the moment, this information currently doesn't affect your Handshake profile.\",\"question\":\"How does this affect my Handshake profile?\"}],\"idVerification\":[{\"answer\":\"Identity verification is a standard requirement for all Handshake AI fellows. It helps ensure the integrity of the program by confirming that each account is tied to a real, unique individual. You'll only need to complete this step once. For this, you'll need a valid government-issued ID.\",\"question\":\"Why do I need to verify my identity? What ID documents are accepted?\"},{\"answer\":\"Identity verification is handled by our trusted verification partner using industry-standard security. Your information is encrypted in transit, stored securely, and used only to confirm your identity for Handshake AI eligibility.\",\"question\":\"How is my ID information stored and protected?\"},{\"answer\":\"If your verification fails, double-check that your ID is valid, unexpired, and that the photo or scan is clear and legible. You'll typically be given the opportunity to try again. If you continue to have trouble, contact our support team and we'll help you work through it.\",\"question\":\"What happens if my identity verification fails?\"}],\"phoneVerification\":{\"code\":[{\"answer\":\"Phone verification confirms that each account is tied to a real, unique individual — it's a standard part of the Handshake AI onboarding process to keep the program secure. You'll only need to complete this step once.\",\"question\":\"Why do I need to verify my phone?\"},{\"answer\":\"Wait a minute or two, then tap Resend code. Check that your phone has signal and can receive SMS. If it still doesn't arrive, use the option to edit your number and confirm you entered it correctly.\",\"question\":\"What if I don't receive my verification code?\"},{\"answer\":\"Verification codes are only valid for a short time. Request a new code with Resend code, then enter the latest code from the most recent message. After the cooldown, you can try again if needed.\",\"question\":\"What if my verification code has expired?\"},{\"answer\":\"This usually means the number is already linked to an existing Handshake account. Try signing in here. If you're not aware of another account, contact us for further investigation.\",\"question\":\"What if I get an error around this being a duplicate phone number?\"},{\"answer\":\"On the verification screen, tap Edit next to your phone number to update it before requesting a code. If you've already completed verification and need to change your number, you can update it from your account settings.\",\"question\":\"Can I change the phone number I entered?\"}],\"phone\":[{\"answer\":\"Phone verification confirms that each account is tied to a real, unique individual — it's a standard part of the Handshake AI onboarding process to keep the program secure. You'll only need to complete this step once.\",\"question\":\"Why do I need to verify my phone?\"},{\"answer\":\"No. WhatsApp is currently not accepted.\",\"question\":\"Can I use WhatsApp?\"},{\"answer\":\"Standard messaging and data rates may apply depending on your carrier and phone plan. Handshake AI does not charge you directly for any verification or notification texts.\",\"question\":\"Will I be charged when I receive a text?\"},{\"answer\":\"The two options are entirely optional and separate from the verification text itself. The first — informational messages — covers updates about projects and tasks you're already active on, like task availability changes and project status updates. The second — promotional messages — covers new project opportunities and program announcements you may be eligible for. You can opt into one, both, or neither without affecting your ability to participate.\",\"question\":\"What do the two text message options mean?\"}]},\"roleDetails\":[{\"answer\":\"These questions allow us to better understand your skills and experience as it relates to the specific requirements of this role.\",\"question\":\"How are these questions related to this role?\"},{\"answer\":\"Please answer these questions to the best of your abilities. If there's a dropdown and no exact match exists, please select the closest match.\",\"question\":\"What if I can't answer some of these questions?\"},{\"answer\":\"Currently no, so please make sure all the information shown is correct. Should anything change after submitting, please reach out to our Template version: {templateVersion}\",\"tips\":\"Tips\"},\"FellowWelcome\":{\"faq\":{\"ai-trainer\":{\"answer1\":\"Working as an AI trainer allows you to contribute your knowledge, skills, and expertise to various projects in collaboration with top AI labs. Additionally, there are several pillars that are true about being an AI trainer:\",\"answer2_list_item1\":\"Projects are completed independently and their availability is subject to change with short notice.\",\"answer2_list_item2\":\"Fraud and community guidelines are taken seriously to protect our community.\",\"answer2_list_item3\":\"Each project is unique with their own expectations, assessments, and requirements.\",\"answer3_link\":\"https://support.joinhandshake.com/hc/en-us/articles/38150760132119-Handshake-AI-Fellowship-Expectations\",\"answer3_link_text\":\"here\",\"answer3_text\":\"To learn more about the experience, read our Help Center article\",\"question\":\"What is it like working as an AI trainer?\"},\"handshake-relation\":{\"answer1\":\"The Handshake AI program is a program within Handshake that connects current students, graduates, and professionals with project based AI opportunities.\",\"answer2\":\"You'll be able to work remotely, independently, and on your own time, all while earning from $17/hr to $150+/hr (depending on the project).\",\"question\":\"How is Handshake AI related to Handshake?\"},\"signup-process\":{\"answer1\":\"The sign up process is broken up into two phases.\",\"answer2\":\"The first phase asks you to fill out some basic information and verify your identity.\",\"answer3\":\"The second phase helps ensure that you're the right fit for a project. You'll start with some orientation through our learning platform and complete an assessment that mirrors actual tasks that are part of the program. Upon passing, you will be invited to join a project that matches your area of expertise or interest.\",\"question\":\"What is the sign up process like?\"},\"time-commitment\":{\"answer1\":\"There's no commitment - you decide what number of hours you'd like to contribute to a project. We typically limit the maximum number of hours per week on a project to 40 to maintain task quality. Many participants contribute about 10-20 hours per week.\",\"question\":\"What's the typical time commitment for a project?\"},\"title\":\"Frequently asked questions\"},\"hero\":{\"finish-application\":{\"cta\":\"Continue signup\",\"subtitle\":\"You're almost there! Complete your signup to start earning through the Handshake AI program.\",\"title\":\"Finish signing up\"},\"non-fellow\":{\"cta\":\"Sign up now\",\"subtitle\":\"Make AI better, smarter, and safer in partnership with top AI labs\",\"title\":\"Earn, learn, and test the limits of AI\"}},\"what-is-handshake-ai\":{\"description\":\"Handshake AI enables students and graduates to apply human judgment and expertise to improve large language models (LLMs) developed by frontier AI labs. The work you can find on Handshake AI is flexible and project-based, allowing you to earn (and use your expertise) while you're in school or working.\",\"title\":\"What is Handshake AI?\"},\"what-projects-are-available\":{\"experts\":\"Experts\",\"generalists\":\"Generalists\",\"professionals\":\"Professionals\",\"row1\":{\"experts\":\"$$40-150/hr\",\"generalists\":\"$$17-50/hr\",\"professionals\":\"$$40-150/hr\",\"title\":\"Pay\"},\"row2\":{\"experts\":\"Open to those pursuing or holding advanced degrees in an academic domain, from MA to PhD\",\"generalists\":\"Open to all current students and grads, all degree levels\",\"professionals\":\"Open to those with 2+ years experience in the requisite professional field\",\"subtitle\":\"Specific requirements will be noted on each project listing\",\"title\":\"Expertise\"},\"row3\":{\"experts\":\"Gain detailed understanding of the limits \u0026 capabilities of AI within your domain\",\"generalists\":\"Basic understanding of how to review and supervise LLMs\",\"professionals\":\"Understand and contribute to AI capabilities in your field\",\"title\":\"Skill development\"},\"row4\":{\"span\":\"There is no hourly requirement. You decide how many hours you want to contribute, up to a maximum of 40 hours/week (Participants typically average 10-15 hours/week)\",\"title\":\"Commitment\"},\"row5\":{\"span\":\"No AI or software engineering experience required\",\"title\":\"Technical requirements\"},\"title\":\"What projects are available?\"},\"whats-in-it-for-you\":{\"paid-experience\":{\"description\":\"Earn from $17/hr to $150+/hr depending on the project and your skills\",\"title\":\"Paid experience\"},\"remote-friendly\":{\"description\":\"Work independently as a contractor on project-based opportunities that fit your schedule\",\"title\":\"Remote-friendly\"},\"skill-development\":{\"description\":\"Gain hands-on experience with real AI projects and build skills for your future\",\"title\":\"Skill development\"}}},\"FormsAdmin\":{\"add_autograder_evaluation\":\"Add autograder evaluation\",\"add_form\":\"Add form\",\"advanced_configuration_description\":\"Configure header overrides and display cards for the form\",\"advanced_configuration_read_only\":\"You are viewing the advanced configuration for a non-latest form version. Only the latest version or draft can be edited.\",\"advanced_configuration_title\":\"Advanced configuration\",\"all_changes_saved\":\"All changes saved\",\"all_results\":\"All results\",\"all_time\":\"All time\",\"all_types\":\"All types\",\"analytics_avg_score\":\"Avg Score\",\"analytics_heading\":\"Assessment Analytics\",\"analytics_median_score\":\"Median Score\",\"analytics_pass_rate\":\"Pass Rate\",\"analytics_pass_rate_breakdown\":\"{passed} passed, {failed} failed, {pending} pending\",\"analytics_total_submissions\":\"Total Submissions\",\"applications_error_create_failed\":\"Failed to create application.\",\"applications_error_cross_project\":\"Application does not belong to this project.\",\"applications_error_form_definition_inv nish 10 hours of work.\",\"title\":\"Refer PhDs and earn up to $725\",\"title_new\":\"Refer and earn!\",\"tracker\":{\"application_completed\":\"Completed application\",\"empty\":{\"description\":\"Share your invite link to start tracking progress here.\",\"title\":\"No referrals yet\"},\"error\":{\"description\":\"We couldn't load your referrals right now. Please try refreshing the page.\",\"title\":\"Unable to load referrals\"},\"incentive\":{\"amount_pending\":\"\",\"rule_pending\":\"Bonus details coming soon\"},\"invite_sent\":\"Invite sent\",\"invited_on\":\"Invited {date}\",\"metrics\":{\"next_payout\":\"Next payment\",\"potential_earnings\":\"Potential earnings\",\"total_earnings\":\"Total earnings\",\"total_referral_bonuses\":\"Total referral bonuses\",\"total_referrals\":\"Total referrals\"},\"payout_summary\":\"Potential reward: {amount}\",\"payout_summary_with_rule\":\"Potential reward: {amount} ({rule})\",\"section_title\":\"Your referrals\",\"statuses\":{\"assigned_to_project\":{\"description\":\"They’ve been assigned to their first project and are getting started.\",\"label\":\"Matched to a project\"},\"completed_ai_interview\":{\"description\":\"Their AI interview is complete and under review.\",\"label\":\"Interview completed\"},\"completed_general_onboarding\":{\"description\":\"They’re completing the remaining onboarding steps.\",\"label\":\"Finishing onboarding tasks\"},\"completed_referral\":{\"description\":\"All steps are done. Your referral payout will process soon.\",\"label\":\"Payout pending\"},\"fallback\":{\"description\":\"We’re updating this referral’s progress. Check back shortly.\",\"label\":\"Status update in progress\"},\"pending\":{\"description\":\"We’re waiting for your referral to create their account.\",\"label\":\"Awaiting sign up\"}},\"unknown_recipient\":\"Awaiting recipient details\",\"worked_hours\":\"Worked 10 hours\"},\"v2\":{\"copied\":\"Copied\",\"copy_error\":\"Failed to copy\",\"copy_referral_link\":\"Copy referral link\",\"error_loading\":\"Unable to load your referral information. Please try again later.\",\"error_loading_referrals\":\"Unable to load your referral activity. Please try again later.\",\"faq\":{\"a1\":\"Referrals allow you to help your network find meaningful AI work. When someone you refer starts working on projects, you earn 10% of their first production project rate for every hour they contribute. Your payout unlocks once they hit 10 hours. Bonuses continue to be earned until you reach the Maximum Referral Bonus or 6 months have passed since your referral created their account, whichever comes first. Referral earnings are paid out as part of your weekly pay cycle.\",\"a10\":\"For pay-by-task projects, the Referral Bonus Rate is 10% of the published approximate hourly rate for that project, as determined by Handshake.\",\"a2\":\"Yes — your Referrals page gives you a live view of each referral's status, how many hours they've worked, and how much you've earned as a referral bonus.\",\"a3\":\"There are two ways to share. Use the Copy referral link button at the top of your Referrals page to share a general link. Or, select a specific role under \\\"Earn as your referral earns\\\" to generate a link tailored to that expertise — great for referring someone you know is a strong fit.\",\"a4\":\"Anyone new to Handshake AI can sign up using your referral link. If you share a role-specific link, your referral will need to meet that role's requirements — but your general link is open to anyone joining the platform for the first time.\",\"a5\":\"Unfortunately, if your referral signs up without using your link, we're unable to track or retroactively apply the referral. Make sure to share your link before they sign up.\",\"a6\":\"You can find all open roles that qualify for referral bonuses under \\\"Earn as your referral earns\\\" on your Referrals page. Don't see a perfect match? Share your general referral link and your referral will be matched to the right role when th f.__next_f.push([1,"\u003cdiv style=\"line-height:1.55;color:#1a1a1a\"\u003e\u003cdiv style=\"margin:0 0 14px;padding:10px 14px;border-left:4px solid #2563eb;background:#eff6ff;color:#1e3a8a\"\u003e\u003cb\u003eFirst, set up your environment.\u003c/b\u003e Follow the \u003ca href=\"https://project-dynamo.learn.joinhandshake.com/setup\" target=\"_blank\"\u003eProject Dynamo setup guide\u003c/a\u003e and install the \u003cb\u003erequired Harbor version\u003c/b\u003e \u003c/div\u003e\u003ch2 style=\"margin:0 0 8px\"\u003eFix a broken Terminal-Bench task\u003c/h2\u003e\u003cp\u003eYou've been handed a Terminal-Bench 2 (Harbor) task whose \u003cb\u003eauthoring is broken\u003c/b\u003e in several ways. The underlying task is simple, everyday software engineering — parse an access log into a small JSON report — so this is \u003cb\u003enot\u003c/b\u003e about the domain. It's about whether you can spot bad task authoring and repair it into \u003cb\u003ecorrect Harbor format\u003c/b\u003e.\u003c/p\u003e\u003cdiv style=\"margin:16px 0\"\u003e\u003ca href=\"https://screening-portal-nine.vercel.app/bundles/fix-task-broken.tar.gz\" style=\"display:inline-block;background:#2563eb;color:#fff;padding:10px 18px;border-radius:8px;text-decoration:none;font-weight:600\"\u003e⬇ Download the broken task (fix-task-broken.tar.gz)\u003c/a\u003e\u003c/div\u003e\u003ch3 style=\"margin:18px 0 6px\"\u003eWhat to do\u003c/h3\u003e\u003col style=\"margin:0 0 8px 18px;padding:0\"\u003e\u003cli\u003eExtract it and open the task in \u003ccode\u003elog-report/\u003c/code\u003e. You'll need \u003cb\u003eDocker\u003c/b\u003e and the Harbor (\u003ccode\u003etb\u003c/code\u003e) harness — see the setup guide above.\u003c/li\u003e\u003cli\u003eBuild and run it, then run the verifier two ways:\u003cpre style=\"background:#0b1021;color:#e6e6e6;padding:12px;border-radius:8px;overflow:auto\"\u003eharbor run -p log-report -a oracle     # reference solution -\u003e should PASS (reward 1)\nharbor run -p log-report --agent nop   # no-op agent -\u003e a good verifier must FAIL (reward 0)\u003c/pre\u003eWatch how it behaves and inspect every file: \u003ccode\u003etask.toml\u003c/code\u003e, \u003ccode\u003einstruction.md\u003c/code\u003e, \u003ccode\u003eenvironment/Dockerfile\u003c/code\u003e, \u003ccode\u003esolution/\u003c/code\u003e, and \u003ccode\u003etests/\u003c/code\u003e.\u003c/li\u003e\u003cli\u003eFind and fix \u003cb\u003eall\u003c/b\u003e the defects so the task is correct, reproducible, and graded honestly.\u003c/li\u003e\u003c/ol\u003e\u003ch3 style=\"margin:18px 0 6px\"\u003e\"Correct Harbor format\" means\u003c/h3\u003e\u003cul style=\"margin:0 0 8px 18px;padding:0\"\u003e\u003cli\u003eThe \u003cb\u003eagent environment\u003c/b\u003e is reproducible (base image pinned by digest) and contains no leaked solution.\u003c/li\u003e\u003cli\u003eThe \u003cb\u003everifier\u003c/b\u003e checks the real outcome (not just that a file exists), and reports via \u003ccode\u003e/logs/verifier/reward.txt\u003c/code\u003e + \u003ccode\u003ectrf.json\u003c/code\u003e.\u003c/li\u003e\u003cli\u003e\u003ccode\u003etask.toml\u003c/code\u003e is valid TB2 Harbor TOML and its declared artifact matches what the task produces.\u003c/li\u003e\u003cli\u003e\u003ccode\u003einstruction.md\u003c/code\u003e is clear, with numbered success criteria that are \u003cb\u003econsistent with the verifier\u003c/b\u003e.\u003c/li\u003e\u003c/ul\u003e\u003cblockquote style=\"margin:14px 0;padding:8px 14px;border-left:4px solid #f59e0b;background:#fffbeb;color:#7c5e10\"\u003e\u003cb\u003eSubmitting:\u003c/b\u003e there are no file uploads — paste your corrected files as \u003cb\u003eplain text\u003c/b\u003e in the boxes below, and include a link to your full fixed task at the end.\u003c/blockquote\u003e\u003cp style=\"margin:14px 0 0\"\u003ePlease make your submission repo private after you pass the assessment.\u003c/p\u003e\u003c/div\u003e"])</script><style data-styled="" data-styled-version="5.3.7" nonce="xLQqkHjbjKZfxFaIwbpjag=="></style><script nonce="xLQqkHjbjKZfxFaIwbpjag==">self.__next_f.push([1,"49:T128d,"])</script><style data-styled="" data-styled-version="5.3.7" nonce="xLQqkHjbjKZfxFaIwbpjag=="></style><script nonce="xLQqkHjbjKZfxFaIwbpjag==">self.__next_f.push([1,"\u003cdiv style=\"line-height:1.5;color:#1a1a1a\"\u003e\u003cp style=\"margin:0 0 8px\"\u003eA correct TB2 Harbor task passes \u003cb\u003eevery\u003c/b\u003e item below. Use it as you fix the task.\u003c/p\u003e\u003ch4 style=\"margin:12px 0 4px\"\u003etask.toml (TB2 format)\u003c/h4\u003e\u003cul style=\"margin:0 0 0 18px\"\u003e\u003cli\u003e\u003ccode\u003eartifacts\u003c/code\u003e is a TOML \u003cb\u003earray\u003c/b\u003e (e.g. \u003ccode\u003e[\"/app/report.json\"]\u003c/code\u003e), \u003cb\u003enot\u003c/b\u003e a string, sits at the top level (above the first \u003ccode\u003e[section]\u003c/code\u003e), and lists the exact file the task produces\u003c/li\u003e\u003cli\u003ea \u003ccode\u003e[task]\u003c/code\u003e section sets \u003ccode\u003ename = \"dynamo/log-report\"\u003c/code\u003e (the \u003ccode\u003edynamo/\u003c/code\u003e org prefix + kebab slug) and a one-line \u003ccode\u003edescription\u003c/code\u003e\u003c/li\u003e\u003cli\u003e\u003ccode\u003e[metadata]\u003c/code\u003e carries every template field: \u003ccode\u003ecategory\u003c/code\u003e, \u003ccode\u003esubcategory\u003c/code\u003e, \u003ccode\u003etask_objective\u003c/code\u003e (array), \u003ccode\u003eartifact_type\u003c/code\u003e (array), \u003ccode\u003eexpert_time_estimate_hours\u003c/code\u003e, \u003ccode\u003emodel_tested\u003c/code\u003e, \u003ccode\u003eagent_tested\u003c/code\u003e, \u003ccode\u003edifficulty_explanation\u003c/code\u003e, \u003ccode\u003esolution_explanation\u003c/code\u003e, \u003ccode\u003everification_explanation\u003c/code\u003e (the template has \u003cb\u003eno\u003c/b\u003e \u003ccode\u003eavg_at_8\u003c/code\u003e, \u003ccode\u003etags\u003c/code\u003e, or \u003ccode\u003eschema_version\u003c/code\u003e)\u003c/li\u003e\u003cli\u003e\u003ccode\u003ecategory\u003c/code\u003e/\u003ccode\u003esubcategory\u003c/code\u003e/\u003ccode\u003etask_objective\u003c/code\u003e/\u003ccode\u003eartifact_type\u003c/code\u003e are \u003cb\u003elowercase snake_case\u003c/b\u003e values drawn from \u003ccode\u003e.dynamo/diversity-taxonomy.toml\u003c/code\u003e\u003c/li\u003e\u003cli\u003e\u003ccode\u003e[agent]\u003c/code\u003e and \u003ccode\u003e[verifier]\u003c/code\u003e each set \u003ccode\u003etimeout_sec\u003c/code\u003e\u003c/li\u003e\u003cli\u003e\u003ccode\u003e[environment]\u003c/code\u003e sets \u003ccode\u003ebuild_timeout_sec\u003c/code\u003e, \u003ccode\u003ecpus\u003c/code\u003e, \u003ccode\u003ememory_mb\u003c/code\u003e, \u003ccode\u003estorage_mb\u003c/code\u003e, \u003ccode\u003egpus\u003c/code\u003e, \u003ccode\u003eallow_internet\u003c/code\u003e, and \u003ccode\u003emcp_servers\u003c/code\u003e\u003c/li\u003e\u003c/ul\u003e\u003ch4 style=\"margin:12px 0 4px\"\u003eenvironment/Dockerfile\u003c/h4\u003e\u003cul style=\"margin:0 0 0 18px\"\u003e\u003cli\u003ebase image is one of the \u003cb\u003eapproved\u003c/b\u003e bases, \u003cb\u003epinned by \u003ccode\u003e@sha256\u003c/code\u003e digest\u003c/b\u003e (a bare tag like \u003ccode\u003epython:3.13-slim-bookworm\u003c/code\u003e is not enough; \u003ccode\u003e:latest\u003c/code\u003e is never allowed)\u003c/li\u003e\u003cli\u003eno solution/answer files copied into the agent image\u003c/li\u003e\u003cli\u003eno network access required at runtime\u003c/li\u003e\u003c/ul\u003e\u003ch4 style=\"margin:12px 0 4px\"\u003etests/ (verifier)\u003c/h4\u003e\u003cul style=\"margin:0 0 0 18px\"\u003e\u003cli\u003e\u003ccode\u003etest_outputs.py\u003c/code\u003e asserts the \u003cb\u003eactual produced values\u003c/b\u003e, not just that a file exists\u003c/li\u003e\u003cli\u003eeach test carries a \u003cb\u003ecomment/docstring\u003c/b\u003e naming the \u003ccode\u003einstruction.md\u003c/code\u003e success criterion it verifies, and the tests correspond 1:1 to those criteria — no criterion left unchecked and no test for something the instruction doesn't state (misaligned verifiers are the main failure mode)\u003c/li\u003e\u003cli\u003e\u003ccode\u003eharbor run -a oracle\u003c/code\u003e \u003cb\u003ePASSES\u003c/b\u003e (reward 1) and \u003ccode\u003e--agent nop\u003c/code\u003e \u003cb\u003eFAILS\u003c/b\u003e (reward 0)\u003c/li\u003e\u003cli\u003e\u003ccode\u003etest.sh\u003c/code\u003e runs \u003cb\u003eplain\u003c/b\u003e \u003ccode\u003epytest\u003c/code\u003e and writes \u003ccode\u003ereward.txt\u003c/code\u003e (1/0) and \u003ccode\u003ectrf.json\u003c/code\u003e to \u003ccode\u003e/logs/verifier/\u003c/code\u003e\u003c/li\u003e\u003cli\u003e\u003ccode\u003epytest\u003c/code\u003e + \u003ccode\u003epytest-json-ctrf\u003c/code\u003e are \u003cb\u003ebaked into\u003c/b\u003e the single \u003ccode\u003eenvironment/Dockerfile\u003c/code\u003e (pip, pinned), so \u003ccode\u003etest.sh\u003c/code\u003e installs nothing at verify time — no \u003ccode\u003euvx\u003c/code\u003e/\u003ccode\u003epip\u003c/code\u003e/\u003ccode\u003ecurl\u003c/code\u003e in \u003ccode\u003etest.sh\u003c/code\u003e\u003c/li\u003e\u003c/ul\u003e\u003ch4 style=\"margin:12px 0 4px\"\u003einstruction.md\u003c/h4\u003e\u003cul style=\"margin:0 0 0 18px\"\u003e\u003cli\u003eprompt style — \u003cb\u003eno title, no \u003ccode\u003e##\u003c/code\u003e section headers\u003c/b\u003e; written as you'd brief a colleague\u003c/li\u003e\u003cli\u003estates the exact output path (absolute) and format\u003c/li\u003e\u003cli\u003enumbered, unambiguous success criteria\u003c/li\u003e\u003cli\u003eno solution hints leaked\u003c/li\u003e\u003cli\u003econsistent with what the verifier checks\u003c/li\u003e\u003cli\u003edoes not exceed 1500 tokens\u003c/li\u003e\u003c/ul\u003e\u003ch4 style=\"margin:12px 0 4px\"\u003eFour-way consistency\u003c/h4\u003e\u003cul style=\"margin:0 0 0 18px\"\u003e\u003cli\u003ethe instruction output path == \u003ccode\u003etask.toml\u003c/code\u003e \u003ccode\u003eartifacts\u003c/code\u003e == what the verifier asserts == what \u003ccode\u003esolve.sh\u003c/code\u003e writes (all \u003ccode\u003e/app/report.json\u003c/code\u003e)\u003c/li\u003e\u003c/ul\u003e\u003ch4 style=\"margin:14px 0 4px\"\u003eRequired task.toml fields (tb2-template-repo reference)\u003c/h4\u003e\u003cpre style=\"background:#0b1021;color:#e6e6e6;padding:12px;border-radius:8px;overflow:auto\"\u003eartifacts = [\"/app/report.json\"]\n\n[task]\nname = \"dynamo/log-report\"\ndescription = \"...\"\n\n[metadata]\ncategory = \"...\"             # snake_case, from .dynamo/diversity-taxonomy.toml\nsubcategory = \"...\"          # snake_case, from taxonomy\ntask_objective = [\"...\"]     # snake_case, from taxonomy\nartifact_type = [\"...\"]      # snake_case, from taxonomy\nexpert_time_estimate_hours = 0.3\nmodel_tested = \"GPT-5.4\"\nagent_tested = \"Terminus-2\"\ndifficulty_explanation = \"...\"\nsolution_explanation = \"...\"\nverification_explanation = \"...\"\n\n[verifier]\ntimeout_sec = 120.0\n\n[agent]\ntimeout_sec = 120.0\n\n[environment]\nbuild_timeout_sec = 600.0\ncpus = 1\nmemory_mb = 2048\nstorage_mb = 10240\ngpus = 0\nallow_internet = true\nmcp_servers = []\u003c/pre\u003e\u003c/div\u003e"])</script><style data-styled="" data-styled-version="5.3.7" nonce="xLQqkHjbjKZfxFaIwbpjag=="></style><script nonce="xLQqkHjbjKZfxFaIwbpjag==">self.__next_f.push([1,"21:[\"$\",\"$L46\",null,{\"formType\":\"assessment\",\"children\":[\"$\",\"$L47\",\"567832eb-eb23-4f7c-9275-1816dd21199c:0:none\",{\"formDefinitionVersion\":{\"id\":\"567832eb-eb23-4f7c-9275-1816dd21199c\",\"name\":\"Dynamo - Fix the Broken Terminal-Bench Task\",\"description\":\"Repair a broken Terminal-Bench 2 (Harbor) task on your own machine, then submit your fix below. Plan for ~60-90 minutes.\",\"formSchema\":{\"pages\":[{\"name\":\"brief\",\"title\":\"Brief\",\"elements\":[{\"html\":\"$48\",\"name\":\"intro\",\"type\":\"html\"},{\"name\":\"reference\",\"type\":\"panel\",\"state\":\"collapsed\",\"title\":\"📋 Checklist \u0026 reference format - open before you start\",\"elements\":[{\"html\":\"$49\",\"name\":\"checklist\",\"type\":\"html\"}]}]},{\"name\":\"diagnose\",\"title\":\"Step 1 - Diagnose\",\"elements\":[{\"name\":\"defects_present\",\"type\":\"checkbox\",\"title\":\"Which defects are present in the task?\",\"choices\":[\"task.toml: artifacts is a string instead of an array (and points to the wrong file)\",\"environment/Dockerfile uses an unpinned base image\",\"the agent image leaks the reference solution\",\"the verifier is gameable (checks the file exists, not its values)\",\"tests/test.sh writes reward to the wrong path and/or omits ctrf.json\",\"instruction.md is ambiguous and inconsistent with the verifier\",\"the access.log input file is corrupted\",\"the task requires network access at runtime to be solved\",\"the solution/solve.sh oracle computes the wrong answer\",\"the memory_mb limit is too low to run the verifier\"],\"isRequired\":true,\"description\":\"Select every one you found - there are several. Some options below are not real defects.\"}],\"description\":\"Before pasting fixes, tell us what's wrong.\"},{\"name\":\"fixes\",\"title\":\"Step 2 - Your fixes\",\"elements\":[{\"name\":\"fixed_task_toml\",\"rows\":14,\"type\":\"comment\",\"title\":\"Corrected task.toml\",\"isRequired\":true,\"description\":\"Paste the complete file. Make sure artifacts is a top-level array (not a string); a [task] section sets name = \\\"dynamo/log-report\\\" and description; [verifier] sets timeout_sec; [metadata] carries every template field (category, subcategory, task_objective, artifact_type — lowercase snake_case from the taxonomy — expert_time_estimate_hours, model_tested, agent_tested, difficulty_explanation, solution_explanation, verification_explanation); and [environment] sets allow_internet and mcp_servers. The template has no avg_at_8/tags/schema_version.\"},{\"name\":\"fixed_dockerfile\",\"rows\":6,\"type\":\"comment\",\"title\":\"Corrected environment/Dockerfile\",\"isRequired\":true,\"description\":\"Paste the complete file, and note any file you removed from the build context. The base image must be an approved base pinned by @sha256 digest.\"},{\"name\":\"verifier_why_bad\",\"type\":\"comment\",\"title\":\"Why is the original verifier bad?\",\"isRequired\":true,\"description\":\"Be specific: what would pass it that should not?\"},{\"name\":\"fixed_verifier\",\"rows\":12,\"type\":\"comment\",\"title\":\"Corrected verifier\",\"isRequired\":true,\"description\":\"Paste your tests/test_outputs.py (and tests/test.sh if you changed it). Each test must (1) carry a comment/docstring naming which instruction.md success criterion it verifies, and (2) match instruction.md exactly — one test per criterion, with no missing or extra checks. test.sh runs plain pytest (deps are baked into the single environment/Dockerfile — no verify-time installs).\"},{\"name\":\"fixed_instruction\",\"rows\":10,\"type\":\"comment\",\"title\":\"Rewritten instruction.md\",\"isRequired\":true,\"description\":\"Paste the full file. It should be unambiguous and match exactly what your verifier checks.\"}],\"description\":\"Paste each corrected file in full, as plain text.\"},{\"name\":\"evidence\",\"title\":\"Step 3 - Evidence \u0026 submission\",\"elements\":[{\"name\":\"diagnosis\",\"rows\":6,\"type\":\"comment\",\"title\":\"Summarize what was broken and why\",\"isRequired\":true,\"description\":\"Cover all four axes: format, environment, verifier, and instruction - and why each breaks Harbor format.\"},{\"name\":\"verifier_output\",\"type\":\"comment\",\"title\":\"Passing verifier output from your fixed task\",\"isRequired\":true,\"description\":\"Paste the reward.txt + ctrf summary for BOTH runs: -a oracle (reward 1) and --agent nop (reward 0).\"},{\"name\":\"verifier_catches_bug\",\"rows\":8,\"type\":\"comment\",\"title\":\"Prove your verifier catches a wrong solution\",\"isRequired\":true,\"description\":\"Introduce a bug in solution/solve.sh (e.g. write a wrong count), run the verifier, and paste the bugged snippet + the verifier output showing reward=0.\"},{\"name\":\"repo_link\",\"type\":\"text\",\"title\":\"Link to your full fixed task\",\"inputType\":\"url\",\"isRequired\":true,\"description\":\"A git repo, gist, or Drive folder we can open to review the complete task. Please make this repo private after you pass the assessment. (make sure you pass it, do not make it private before passing)\",\"placeholder\":\"https://github.com/you/your-fixed-task\"}]}],\"title\":\"Dynamo - Fix the Broken Terminal-Bench Task\",\"widthMode\":\"responsive\",\"description\":\"Repair a broken Terminal-Bench 2 (Harbor) task on your own machine, then submit your fix below. Plan for ~60-90 minutes.\",\"completedHtml\":\"\u003cdiv style=\\\"text-align:center;padding:24px\\\"\u003e\u003ch3\u003e✅ Submitted — thanks!\u003c/h3\u003e\u003cp style=\\\"color:#555\\\"\u003eYour fix is in for review. We'll follow up with results.\u003c/p\u003e\u003c/div\u003e\"},\"dataModelSchema\":{\"diagnosis\":{\"type\":\"string\",\"required\":true},\"repo_link\":{\"type\":\"string\",\"required\":true},\"fixed_verifier\":{\"type\":\"string\",\"required\":true},\"defects_present\":{\"type\":\"array\",\"items\":{\"type\":\"string\"},\"required\":true},\"fixed_task_toml\":{\"type\":\"string\",\"required\":true},\"verifier_output\":{\"type\":\"string\",\"required\":true},\"fixed_dockerfile\":{\"type\":\"string\",\"required\":true},\"verifier_why_bad\":{\"type\":\"string\",\"required\":true},\"fixed_instruction\":{\"type\":\"string\",\"required\":true},\"verifier_catches_bug\":{\"type\":\"string\",\"required\":true}},\"createdAt\":\"$D2026-06-23T22:00:07.054Z\",\"updatedAt\":\"$D2026-06-23T22:00:07.321Z\",\"createdBy\":\"71aab4e2-26cb-4e2d-a414-097778328014\",\"updatedBy\":\"71aab4e2-26cb-4e2d-a414-097778328014\",\"formDefinitio
